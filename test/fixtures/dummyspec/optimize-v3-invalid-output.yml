    A:
      description: ''
      type: object
      properties:
        a:
          type: string
          minLength: 1
          examples:
            - 669e01d59ba47d8e3e21cf13
      required:
        - a
    EnvelopeOverrides:
      description: Envelope overrides for this event
      type: object
      properties:
        type:
          type: string
          const: a
      required:
        - type
    EventEnvelope:
      allOf:
        - $ref: https://raw.githubusercontent.com/cloudevents/spec/v1.0.2/cloudevents/formats/cloudevents.json
